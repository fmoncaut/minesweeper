<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        :root {
            --cell-size: 45px;
            --bg-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--bg-color); }

        #status {
            height: 30px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* Grille alignée de manière rigide */
        #board {
            display: grid;
            /* Le repeat(8, ...) doit correspondre à la largeur de votre grille backend */
            grid-template-columns: repeat(8, var(--cell-size));
            gap: 4px;
            background-color: #95a5a6;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: none;
            border-radius: 4px;
            background-color: #34495e;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .cell:hover { background-color: #4e6a85; }

        /* Style pour les cases révélées */
        .cell.revealed {
            background-color: #ecf0f1;
            color: #2c3e50;
            cursor: default;
        }

        .cell.mine { background-color: #e74c3c; }

        .controls { margin-top: 20px; }

        button#restart-btn {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>💣 Minesweeper</h1>
    <div id="status"></div>
    <div id="board"></div>

    <div class="controls">
        <button id="restart-btn" onclick="restart()">🔄 Restart Game</button>
    </div>

    <script>
        async function loadBoard() {
            const res = await fetch('/board');
            const data = await res.json();
            renderBoard(data.board, data.winner);
        }

        function renderBoard(board, winner) {
            const div = document.getElementById('board');
            const status = document.getElementById('status');
            div.innerHTML = '';

            if (winner) {
                status.textContent = '🎉 You Win!';
                status.style.color = '#27ae60';
            }

            board.forEach((row, r) => {
                row.forEach((cell, c) => {
                const btn = document.createElement('button');
                btn.className = 'cell';

                // Si la case est vide ou null dans l'objet JSON envoyé par le serveur,
                // on n'affiche rien du tout sur le bouton.
                if (cell !== "" && cell !== null && cell !== undefined) {
                    btn.textContent = cell;
                    btn.classList.add('revealed');
                    if (cell === 'M') btn.classList.add('mine');
                } else {
                    btn.textContent = ""; // ON FORCE LE VIDE ICI
                    btn.classList.remove('revealed');
                }

                btn.onclick = () => reveal(r, c);
                div.appendChild(btn);
            });
        });
        }

        async function reveal(row, col) {
            const res = await fetch('/reveal', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({row, col})
            });
            const data = await res.json();
            const status = document.getElementById('status');

            if (data.result === 'Game Over') {
                status.textContent = '💥 Game Over!';
                status.style.color = '#e74c3c';
            }
            renderBoard(data.board, data.winner);
        }

        async function restart() {
            const res = await fetch('/restart', {method: 'POST'});
            const data = await res.json();
            document.getElementById('status').textContent = '';
            renderBoard(data.board, false);
        }

        // Initialisation au chargement
        loadBoard();
    </script>
</body>
</html>
